<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Tracking - Wave Heights & Satellite</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Esri Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .leaflet-control-layers { max-height: 300px; overflow-y: auto; }
        .info-box {
            position: absolute;
            top: 10px;
            left: 60px;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
            font-size: 14px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="info-box">
        <h3>🌊 Storm Operations Center</h3>
        <p><strong>Wave Heights:</strong> NOAA nowCOAST (Live)</p>
        <p><strong>Buoys:</strong> NDBC Stations</p>
        <p><strong>Alerts:</strong> NWS Warnings</p>
        <p><strong>Storms:</strong> NHC Tracking</p>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Esri Leaflet JS -->
    <script src="https://unpkg.com/esri-leaflet@3.0.11/dist/esri-leaflet.js"
      integrity="sha512-qZ5e5k4S3FQY0T0dCszm0B5HfCwqQpB6s5kL2pMcwq4iJ6mCJ1qzY9jq0IYqnt6zJSkqTnqM3wY3QdMXT5yD2w=="
      crossorigin=""></script>

    <script>
        // Initialize map
        const map = L.map('map').setView([25.7617, -80.1918], 7); // Miami area

        // Base layers
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        });

        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri'
        });

        // Add default base layer
        osm.addTo(map);

        // --- Wave Height (nowCOAST WW3) ---
        // Example nowCOAST MapServer for significant wave height (global mosaic).
        // If you want a different basin/region, swap the URL for the layer you prefer.
        const WW3_SIGWAVEHEIGHT = L.esri.dynamicMapLayer({
            url: "https://nowcoast.noaa.gov/arcgis/rest/services/nowcoast/ww3_sigwaveheight_time/MapServer",
            opacity: 0.6
        });

        // toggle button (simple)
        const wavesOn = { on: false };
        const wavesBtn = L.control({ position: "topleft" });
        wavesBtn.onAdd = function() {
            const div = L.DomUtil.create("div", "leaflet-bar");
            const a = L.DomUtil.create("a", "", div);
            a.href = "#";
            a.title = "Toggle Wave Height";
            a.innerHTML = "🌊";
            a.style.padding = "6px 10px";
            a.onclick = (e) => {
                e.preventDefault();
                if (wavesOn.on) {
                    map.removeLayer(WW3_SIGWAVEHEIGHT);
                    wavesOn.on = false;
                } else {
                    WW3_SIGWAVEHEIGHT.addTo(map);
                    wavesOn.on = true;
                }
            };
            return div;
        };
        wavesBtn.addTo(map);

        // --- GOES-East IR overlay (convection/cloud tops) ---
        // Time-sensitive imagery; this URL serves the latest available tiles.
        const GOES_IR = L.tileLayer(
            "https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/goes-east-ir-13/{z}/{x}/{y}.png",
            { opacity: 0.6, attribution: "GOES-East IR tiles" }
        );

        // Toggle button
        const satOn = { on: false };
        const satBtn = L.control({ position: "topleft" });
        satBtn.onAdd = function() {
            const div = L.DomUtil.create("div", "leaflet-bar");
            const a = L.DomUtil.create("a", "", div);
            a.href = "#";
            a.title = "Toggle Satellite (IR)";
            a.innerHTML = "🛰️";
            a.style.padding = "6px 10px";
            a.onclick = (e) => {
                e.preventDefault();
                if (satOn.on) {
                    map.removeLayer(GOES_IR);
                    satOn.on = false;
                } else {
                    GOES_IR.addTo(map);
                    satOn.on = true;
                }
            };
            return div;
        };
        satBtn.addTo(map);

        // NOAA nowCOAST Sea Surface Temperature
        const sstLayer = L.esri.dynamicMapLayer({
            url: 'https://nowcoast.noaa.gov/arcgis/rest/services/nowcoast/sat_meteo_imagery_time/MapServer',
            layers: [1], // SST layer
            opacity: 0.6,
            f: 'image'
        });

        // GOES Satellite Infrared Overlay
        const goesIRLayer = L.esri.dynamicMapLayer({
            url: 'https://nowcoast.noaa.gov/arcgis/rest/services/nowcoast/sat_meteo_imagery_goes_time/MapServer',
            layers: [1], // GOES IR
            opacity: 0.5,
            f: 'image'
        });

        // Layer control
        const baseLayers = {
            "OpenStreetMap": osm,
            "Satellite": satellite
        };

        const overlayLayers = {
            "🌊 Wave Heights (WAVEWATCH III)": waveHeightLayer,
            "🌡️ Sea Surface Temperature": sstLayer,
            "🛰️ GOES Infrared": goesIRLayer
        };

        L.control.layers(baseLayers, overlayLayers).addTo(map);

        // Add wave height layer by default
        waveHeightLayer.addTo(map);

        // Load live data from your API endpoints
        async function loadLiveData() {
            try {
                // NDBC Buoys
                const buoyResponse = await fetch('/api/weather/buoys');
                const buoyData = await buoyResponse.json();
                
                buoyData.forEach(buoy => {
                    if (buoy.lat && buoy.lon) {
                        const marker = L.marker([buoy.lat, buoy.lon])
                            .bindPopup(`
                                <b>🌊 Buoy ${buoy.stationId}</b><br>
                                Wave Height: ${buoy.measurements?.significantWaveHeight || 'N/A'} m<br>
                                Wind: ${buoy.measurements?.windSpeed || 'N/A'} mph<br>
                                Pressure: ${buoy.measurements?.atmosphericPressure || 'N/A'} mb
                            `);
                        marker.addTo(map);
                    }
                });

                // NWS Alerts
                const alertResponse = await fetch('/api/weather/alerts');
                const alertData = await alertResponse.json();
                
                alertData.forEach(alert => {
                    if (alert.geometry) {
                        const alertLayer = L.geoJSON(alert.geometry, {
                            style: {
                                color: alert.severity === 'extreme' ? '#dc2626' : 
                                       alert.severity === 'severe' ? '#ea580c' : '#2563eb',
                                weight: 2,
                                fillOpacity: 0.2
                            }
                        }).bindPopup(`
                            <b>🚨 ${alert.title}</b><br>
                            ${alert.description}<br>
                            <i>Severity: ${alert.severity}</i>
                        `);
                        alertLayer.addTo(map);
                    }
                });

                // Hurricane Data
                const nhcResponse = await fetch('/api/weather/nhc');
                const nhcData = await nhcResponse.json();
                
                if (nhcData.storms) {
                    nhcData.storms.forEach(storm => {
                        if (storm.geometry) {
                            const stormLayer = L.geoJSON(storm.geometry, {
                                style: {
                                    color: '#dc2626',
                                    weight: 3,
                                    fillOpacity: 0.3
                                }
                            }).bindPopup(`
                                <b>🌀 ${storm.name || 'Active Storm'}</b><br>
                                ${storm.advisory || 'Hurricane tracking data'}
                            `);
                            stormLayer.addTo(map);
                        }
                    });
                }

            } catch (error) {
                console.log('Note: Live data loading failed, map tiles still work:', error.message);
            }
        }

        // Load live data on map ready
        map.whenReady(() => {
            loadLiveData();
            
            // Refresh data every 5 minutes
            setInterval(loadLiveData, 5 * 60 * 1000);
        });

        // Map click handler for coordinates
        map.on('click', function(e) {
            console.log('Coordinates:', e.latlng.lat, e.latlng.lng);
        });
    </script>
</body>
</html>
