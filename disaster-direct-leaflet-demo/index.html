<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Disaster Direct • Leaflet Demo</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      html, body, #root { height: 100%; margin: 0; }
      .app { display: grid; grid-template-rows: auto 1fr auto; height: 100%; font-family: Inter, system-ui, Arial, sans-serif; }
      header { padding: 12px 16px; border-bottom: 1px solid #eee; }
      footer { padding: 8px 16px; border-top: 1px solid #eee; font-size: 12px; color: #555; }
      .map { height: 100%; }
      .legend { position: absolute; bottom: 12px; left: 12px; background: rgba(255,255,255,0.9); padding: 8px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
      .controls { display: flex; gap: 8px; align-items: center; }
      .controls input { width: 110px; padding: 4px 6px; }
      .pill { display:inline-block; padding:4px 8px; border-radius: 999px; background:#f1f5f9; font-size:12px; }
      .error { color:#b00020; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
